name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_NAMESPACE }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build, Tag, and Push carbon-api
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          DOCKER_HUB_REGISTRY=benjaminkwan
          DOCKER_HUB_REPOSITORY=carbon-api

          docker build -t $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG

          docker tag $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:latest
          docker push $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:latest

      - name: Build, Tag, and Push carbon-streamlit
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          DOCKER_HUB_REGISTRY=benjaminkwan
          DOCKER_HUB_REPOSITORY=carbon-streamlit

          docker build -t $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG -f Dockerfile.streamlit .
          docker push $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG

          docker tag $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:$IMAGE_TAG $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:latest
          docker push $DOCKER_HUB_REGISTRY/$DOCKER_HUB_REPOSITORY:latest
